groups:
  - name: prizeprice-api-alerts
    rules:
      - alert: PrizePriceApiHigh5xxRatio
        expr: |
          (
            sum(rate(http_request_duration_seconds_count{code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_request_duration_seconds_count[5m])), 1)
          ) > 0.02
        for: 5m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "High 5xx ratio on API"
          description: "5xx ratio is above 2% for 5 minutes."
          runbook: "docs/RUNBOOK.md#1-api-unavailable"

      - alert: PrizePriceApiHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 0.75
        for: 10m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "High API p95 latency"
          description: "Global API p95 latency is above 750ms for 10 minutes."
          runbook: "docs/RUNBOOK.md#1-api-unavailable"

      - alert: PrizePriceApiTargetDown
        expr: up{job="prizeprice-api"} == 0
        for: 2m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API target is down"
          description: "Prometheus cannot scrape the prizeprice-api target."
          runbook: "docs/RUNBOOK.md#1-api-unavailable"

      - alert: PrizePriceAuth429Spike
        expr: |
          sum(rate(http_request_duration_seconds_count{route=~"/api/auth/.*",code="429"}[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          service: auth
        annotations:
          summary: "Auth 429 spike"
          description: "Rate-limit responses on auth endpoints are above expected baseline."
          runbook: "docs/RUNBOOK.md#3-auth-degradation-429503-spikes"

      - alert: PrizePriceMetricsUnauthorizedSpike
        expr: |
          sum(rate(http_request_duration_seconds_count{route="/metrics",code="401"}[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: metrics
        annotations:
          summary: "401 spike on /metrics"
          description: "Metrics endpoint receives unauthorized requests above baseline."
          runbook: "docs/RUNBOOK.md#4-metrics-returns-401-unexpectedly"

      - alert: PrizePriceWatcherFailures
        expr: |
          sum(increase(price_watcher_errors_total[10m])) > 0
        for: 5m
        labels:
          severity: warning
          service: watcher
        annotations:
          summary: "Price watcher failures detected"
          description: "Watcher error counter increased in the last 10 minutes."
          runbook: "docs/RUNBOOK.md#6-watcher-failures-or-notification-anomalies"
