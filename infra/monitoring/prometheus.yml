global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.prometheus.yml

scrape_configs:
  - job_name: 'prizeprice-api'
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['host.docker.internal:3001']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
