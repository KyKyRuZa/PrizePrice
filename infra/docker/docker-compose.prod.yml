name: prizeprice

services:
  postgres:
    image: postgres:17.7-alpine
    container_name: prizeprice-postgres
    restart: always
    env_file:
      - ../env/.env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prizeprice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prizeprice}
      POSTGRES_DB: ${POSTGRES_DB:-prizeprice}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - prizeprice_pgdata:/var/lib/postgresql/data
    networks:
      - prizeprice
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prizeprice} -d ${POSTGRES_DB:-prizeprice}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8.2-alpine
    container_name: prizeprice-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - prizeprice_redis_data:/data
    networks:
      - prizeprice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: server
    container_name: prizeprice-server
    restart: always
    env_file:
      - ../env/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - prizeprice
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: caddy
    container_name: prizeprice-caddy
    restart: always
    env_file:
      - ../env/.env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
    networks:
      - prizeprice
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prizeprice_pgdata:
  prizeprice_redis_data:
  caddy_data:
  caddy_config:

networks:
  prizeprice:
    driver: bridge
